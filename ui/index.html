<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HaruCloud Sync</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app">
    <main class="shell">
      <header class="hero">
        <h1 class="hero-title">HaruCloud Sync</h1>
        <p class="hero-sub">MinIO とフォルダをつなぐ同期クライアント</p>
      </header>

      <div class="stack">
        <div class="group">
          <h2 class="group-label">MinIO</h2>
          <section class="panel">
            <div class="grid">
              <label class="field"
                >Endpoint<input id="endpoint" type="text" placeholder="192.168.1.10:9000" autocomplete="off"
              /></label>
              <label class="field">Region<input id="region" type="text" value="us-east-1" autocomplete="off" /></label>
              <label class="field">Access Key<input id="accessKey" type="text" autocomplete="username" /></label>
              <label class="field">Secret Key<input id="secretKey" type="password" autocomplete="current-password" /></label>
              <label class="field">Bucket<input id="bucket" type="text" autocomplete="off" /></label>
              <label class="field field-inline field-span-full">
                <input id="secure" type="checkbox" />
                <span class="field-inline-text">TLS (https) を使用</span>
              </label>
            </div>
          </section>
        </div>

        <div class="group">
          <h2 class="group-label">同期フォルダ</h2>
          <section class="panel">
            <div class="table-wrap">
              <table class="sheet">
                <thead>
                  <tr>
                    <th scope="col">Folder ID</th>
                    <th scope="col">Local Path</th>
                    <th scope="col" class="col-actions"></th>
                  </tr>
                </thead>
                <tbody id="mappingsBody"></tbody>
              </table>
            </div>
            <button type="button" id="addMapping" class="btn btn-ghost btn-add">＋ 行を追加</button>
          </section>
        </div>

        <div class="group">
          <h2 class="group-label">操作</h2>
          <section class="panel actions" aria-label="操作">
            <button type="button" id="saveConfig" class="btn btn-primary">設定を保存</button>
            <button type="button" id="testConnection" class="btn btn-secondary">接続をテスト</button>
            <button type="button" id="manualSync" class="btn btn-secondary">手動同期（アップロード）</button>
          </section>
        </div>

        <div class="group">
          <h2 class="group-label">ログ</h2>
          <section class="panel panel-log">
            <pre id="logOutput" class="log"></pre>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
